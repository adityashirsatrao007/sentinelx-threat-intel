services:
  - type: web
    name: sentinelx-api
    runtime: docker
    repo: https://github.com/adityashirsatrao/sentinelx-threat-intel
    plan: free
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: SentinelX
      - key: APP_VERSION
        value: "1.0.0"
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: sentinelx-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://sentinelx-frontend-nu.vercel.app,http://localhost:3000,http://localhost:5173
      - key: FRONTEND_URL
        value: https://sentinelx-frontend-nu.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: CELERY_BROKER_URL
        value: redis://localhost:6379/0
      - key: CELERY_RESULT_BACKEND
        value: redis://localhost:6379/1

databases:
  - name: sentinelx-db
    plan: free
    region: oregon
